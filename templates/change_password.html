<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Deteksi Penyakit Kentang</title>

    <!-- BOOTSTRAP -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet"
    />

    <style>

        /* ================= BODY ================= */

        body {
            background-color: #e6f4ea;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }

        /* ================= LOGIN CARD ================= */

        .login-card {
            width: 100%;
            max-width: 400px;
            padding: 35px;
            border-radius: 15px;
            background: rgba(209, 231, 221, 0.95);
            box-shadow: 0 0 20px rgba(0, 100, 0, 0.2);
            backdrop-filter: blur(4px);
        }

        /* ================= TITLE ================= */

        .login-title {
            text-align: center;
            margin-bottom: 25px;
            font-weight: bold;
            color: #1b5e20;
        }

        /* ================= INPUT ================= */

        .form-control {
            padding: 12px;
            border-radius: 10px;
            font-size: 15px;
        }

        .form-control:focus {
            border-color: #2e7d32;
            box-shadow: 0 0 5px rgba(46, 125, 50, 0.4);
        }

        /* ================= BUTTON ================= */

        .btn-green {
            background-color: #2e7d32;
            color: white;
            padding: 12px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-green:hover {
            background-color: #27632a;
            color: white;
        }

        /* ================= REGISTER LINK ================= */

        .register-link {
            text-align: center;
            margin-top: 18px;
        }

        .register-link a {
            color: #1b5e20;
            text-decoration: none;
            font-weight: bold;
        }

        .register-link a:hover {
            text-decoration: underline;
        }

        /* ================= RESPONSIVE MOBILE ================= */

        @media screen and (max-width: 768px) {

            body {
                padding: 15px;
            }

            .login-card {
                width: 100%;
                max-width: 100%;
                padding: 25px;
                border-radius: 12px;
            }

            .login-title {
                font-size: 24px;
            }

            .form-control {
                font-size: 16px;
                padding: 12px;
            }

            .btn-green {
                width: 100%;
                font-size: 16px;
                padding: 12px;
            }

        }

    </style>

</head>

<body>

    <!-- ================= LOGIN CARD ================= -->

    <div class="login-card">

        <h3 class="login-title">
            🌿 Login Aplikasi
        </h3>

        <!-- FLASH MESSAGE -->

        {% with messages = get_flashed_messages() %}

            {% if messages %}

                <div class="alert alert-danger" role="alert">
                    {{ messages[0] }}
                </div>

            {% endif %}

        {% endwith %}

        <!-- FORM LOGIN -->

        <form method="POST" action="{{ url_for('login') }}">

            <div class="mb-3">

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Username"
                    required
                    autofocus
                />

            </div>

            <div class="mb-3">

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Password"
                    required
                />

            </div>

            <button type="submit" class="btn btn-green w-100">
                Masuk
            </button>

        </form>

        <!-- REGISTER -->

        <div class="register-link">

            Belum punya akun?
            <a href="{{ url_for('register') }}">
                Daftar
            </a>

        </div>

    </div>

</body>
</html>
