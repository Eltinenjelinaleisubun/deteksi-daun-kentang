<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deteksi Kentang</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0b0f0c;
    color:white;
}

.header{
    text-align:center;
    padding:20px;
}

.header h1{
    color:#2ecc71;
}

.card{
    width:90%;
    max-width:500px;
    margin:20px auto;
    background:rgba(255,255,255,0.06);
    padding:20px;
    border-radius:18px;
    text-align:center;
}

.btn{
    padding:12px 18px;
    margin:8px;
    border:none;
    border-radius:12px;
    font-weight:bold;
    cursor:pointer;
}

.green{
    background:#2ecc71;
    color:white;
}

.red{
    background:#e74c3c;
    color:white;
}

img{
    width:100%;
    max-width:320px;
    margin-top:15px;
    border-radius:15px;
    display:none;
}

input[type=file]{
    display:none;
}

.camera{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:black;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

video{
    width:90%;
    max-width:500px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="header">
    <h1>🌿 Deteksi Penyakit Kentang</h1>
</div>

<div class="card">

    <h3>Pilih Gambar</h3>

    <!-- GALERI -->
    <label class="btn green">
        📁 Galeri
        <input type="file" id="fileInput" accept="image/*">
    </label>

    <!-- KAMERA -->
    <button class="btn green" onclick="openCamera()">
        📷 Kamera
    </button>

    <img id="preview">

    <form action="/predict" method="POST" enctype="multipart/form-data">
        <input type="file" name="image" id="hiddenInput">
        <button type="submit" class="btn green" id="detectBtn" style="display:none;">
            🔍 Deteksi
        </button>
    </form>

</div>

<!-- CAMERA -->
<div class="camera" id="cameraBox">

    <video id="video" autoplay></video>

    <div>
        <button class="btn green" onclick="capture()">Ambil</button>
        <button class="btn red" onclick="closeCamera()">Tutup</button>
    </div>

</div>

<script>

let stream;

const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const hiddenInput = document.getElementById("hiddenInput");
const detectBtn = document.getElementById("detectBtn");

/* GALERI */
fileInput.onchange = function(){
    const file = this.files[0];

    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";

    hiddenInput.files = this.files;
    detectBtn.style.display = "inline-block";
}

/* CAMERA */
async function openCamera(){

    const video = document.getElementById("video");
    document.getElementById("cameraBox").style.display = "flex";

    stream = await navigator.mediaDevices.getUserMedia({
        video:{facingMode:"environment"}
    });

    video.srcObject = stream;
}

function closeCamera(){
    if(stream){
        stream.getTracks().forEach(t => t.stop());
    }
    document.getElementById("cameraBox").style.display = "none";
}

function capture(){

    const video = document.getElementById("video");

    const canvas = document.createElement("canvas");
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;

    canvas.getContext("2d").drawImage(video,0,0);

    canvas.toBlob(blob => {

        const file = new File([blob],"camera.jpg",{type:"image/jpeg"});

        let dt = new DataTransfer();
        dt.items.add(file);

        hiddenInput.files = dt.files;

        preview.src = URL.createObjectURL(file);
        preview.style.display = "block";

        detectBtn.style.display = "inline-block";

        closeCamera();

    });

}

</script>

</body>
</html>
