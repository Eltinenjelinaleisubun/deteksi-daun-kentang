<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Gambar</title>

<style>

/* ================= CONTAINER ================= */

.upload-section{
    margin-top:30px;
    padding:25px;
    background:rgba(255,255,255,0.08);
    border-radius:18px;
    text-align:center;
    font-family:Segoe UI, sans-serif;
    color:white;
}

/* ================= TITLE ================= */

.upload-section h2{
    margin-bottom:15px;
    font-size:20px;
}

/* ================= BUTTON AREA ================= */

.upload-buttons{
    display:flex;
    gap:15px;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:10px;
}

/* ================= BUTTON STYLE ================= */

.upload-btn{
    background:linear-gradient(135deg,#2ecc71,#27ae60);
    color:white;
    padding:12px 18px;
    border-radius:12px;
    cursor:pointer;
    font-weight:bold;
    transition:0.3s;
    min-width:180px;
    display:inline-block;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.upload-btn:hover{
    transform:scale(1.05);
    background:linear-gradient(135deg,#27ae60,#219150);
}

/* ================= NOTE ================= */

.upload-note{
    margin-top:12px;
    font-size:13px;
    opacity:0.8;
}

body{
    background:#111;
}

</style>

</head>

<body>

<!-- ================= UPLOAD SECTION ================= -->

<div class="upload-section">

    <h2>📤 Upload Gambar Daun Kentang</h2>

    <div class="upload-buttons">

        <!-- GALERI -->
        <label class="upload-btn">
            📁 Upload dari Galeri
            <input type="file"
                   name="image"
                   accept="image/*"
                   style="display:none;">
        </label>

        <!-- KAMERA -->
        <label class="upload-btn">
            📷 Ambil dari Kamera
            <input type="file"
                   name="image"
                   accept="image/*"
                   capture="environment"
                   style="display:none;">
        </label>

    </div>

    <p class="upload-note">
        Pilih galeri atau ambil foto langsung dari kamera.
    </p>

</div>

</body>
</html>
