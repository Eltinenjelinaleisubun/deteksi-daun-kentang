<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hasil Deteksi</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, sans-serif;
    background:#0b0f0c;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.card{
    background:rgba(255,255,255,0.08);
    padding:25px;
    border-radius:18px;
    text-align:center;
    width:90%;
    max-width:450px;
}

h2{
    color:#2ecc71;
}

img{
    width:100%;
    border-radius:15px;
    margin-top:15px;
}

.btn{
    display:inline-block;
    margin-top:15px;
    padding:12px 18px;
    background:#2ecc71;
    color:white;
    text-decoration:none;
    border-radius:12px;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="card">

    <h2>🌿 Hasil Deteksi</h2>

    <img src="{{ url_for('static', filename='uploads/' + filename) }}">

    <h3>{{ label }}</h3>

    <p>Akurasi: {{ conf }}%</p>

    <a href="{{ url_for('home') }}" class="btn">
        ← Beranda
    </a>

</div>

</body>
</html>
