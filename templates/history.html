<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Riwayat Deteksi</title>

    <style>

        /* ================= RESET ================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* ================= BODY ================= */

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color:#fff;
            position:relative;
            min-height:100vh;
            overflow-y:auto;
            background:#000;
        }

        /* ================= BACKGROUND ================= */

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:url('/static/images/Bc.jpeg')
            no-repeat center/cover;
            background-size:cover;
            filter:blur(10px) brightness(0.6);
            z-index:-2;
        }

        body::after{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.4);
            z-index:-1;
        }

        /* ================= NAVBAR ================= */

        .navbar{
            position:sticky;
            top:0;
            background:rgba(0,0,0,0.6);
            display:flex;
            justify-content:space-between;
            align-items:center;
            padding:18px 25px;
            z-index:10;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);
            backdrop-filter:blur(4px);
        }

        .navbar h2{
            margin:0;
            font-size:30px;
            color:#fff;
        }

        .navbar a{
            text-decoration:none;
            background:#4CAF50;
            color:#fff;
            padding:10px 18px;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .navbar a:hover{
            background:#45a049;
            transform:scale(1.05);
        }

        /* ================= CONTAINER ================= */

        .history-container{
            display:grid;
            grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
            gap:22px;
            max-width:1200px;
            margin:30px auto;
            padding:0 15px 40px 15px;
        }

        /* ================= CARD ================= */

        .history-card{
            background:rgba(255,255,255,0.95);
            border-radius:18px;
            overflow:hidden;
            box-shadow:0 6px 20px rgba(0,0,0,0.3);
            transition:0.3s;
            cursor:pointer;
            backdrop-filter:blur(4px);
        }

        .history-card:hover{
            transform:translateY(-8px) scale(1.03);
            box-shadow:0 12px 30px rgba(0,0,0,0.5);
        }

        /* ================= IMAGE ================= */

        .history-card img{
            width:100%;
            height:200px;
            object-fit:cover;
            display:block;
        }

        /* ================= TEXT ================= */

        .history-card p{
            margin:0;
            padding:16px;
            font-weight:bold;
            font-size:17px;
            color:#2e7d32;
            text-align:center;
        }

        /* ================= EMPTY DATA ================= */

        .empty-data{
            text-align:center;
            font-size:20px;
            margin-top:50px;
            color:white;
        }

        /* ================= SCROLLBAR ================= */

        ::-webkit-scrollbar{
            width:10px;
        }

        ::-webkit-scrollbar-track{
            background:rgba(0,0,0,0.2);
        }

        ::-webkit-scrollbar-thumb{
            background-color:#4CAF50;
            border-radius:5px;
        }

        /* ================= RESPONSIVE MOBILE ================= */

        @media screen and (max-width:768px){

            .navbar{
                flex-direction:column;
                gap:15px;
                text-align:center;
                padding:15px;
            }

            .navbar h2{
                font-size:24px;
            }

            .navbar a{
                width:100%;
                text-align:center;
                padding:10px;
                font-size:15px;
            }

            .history-container{
                grid-template-columns:1fr;
                gap:18px;
                margin-top:20px;
                padding:0 12px 30px 12px;
            }

            .history-card img{
                height:180px;
            }

            .history-card p{
                font-size:15px;
                padding:14px;
            }

        }

    </style>

</head>

<body>

<!-- ================= NAVBAR ================= -->

<div class="navbar">

    <h2>
        📋 Riwayat Deteksi
    </h2>

    <a href="{{ url_for('home') }}">
        🏠 Beranda
    </a>

</div>

<!-- ================= HISTORY ================= -->

<div class="history-container">

    {% if data %}

        {% for row in data %}

        <div class="history-card">

            <img
                src="/static/uploads/{{ row[4] }}"
                alt="Hasil Deteksi"
            >

            <p>
                {{ row[2] }}
            </p>

        </div>

        {% endfor %}

    {% else %}

        <div class="empty-data">
            Belum ada riwayat deteksi
        </div>

    {% endif %}

</div>

</body>
</html>
