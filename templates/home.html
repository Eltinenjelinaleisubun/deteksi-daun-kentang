<!DOCTYPE html>
<html lang="id">

<head>

    <title>

    <link rel="stylesheet"

                🔍 Mulai Deteksi

            </a>

        </div>

        <!-- ================= MENU ================= -->

        <div class="menu-section">

            <div class="menu-title">

            <div class="menu-links">

                <a href="{{ url_for('profil') }}"

                        <div class="menu-icon">

                <a href="{{ url_for('history') }}"

                        <div class="menu-icon">

                    </div>

                    <div class="arrow">
                        ›
                    </div>

                </a>

                <!-- LOGOUT -->

                <a href="{{ url_for('logout') }}"
                   class="menu-item">

                    <div class="menu-left">

                        <div class="menu-icon">
                            🚪
                        </div>

                        <div class="menu-text">
                            Logout
                        </div>

                    </div>

                    <div class="arrow">
                        ›
                    </div>

                </a>

            </div>

        </div>

        <!-- ================= FOOTER ================= -->

        <div class="footer">
