<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <!-- RESPONSIVE MOBILE -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Beranda - Sistem Deteksi Penyakit</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        /* ================= RESET ================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* ================= BODY ================= */

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh;
            background:#000;
            position:relative;
            color:white;
            overflow-x:hidden;
        }

        /* ================= BACKGROUND ================= */

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:url('/static/images/Bc.jpeg')
            no-repeat center/cover;
            filter:blur(10px) brightness(0.6);
            z-index:-2;
        }

        body::after{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.3);
            z-index:-1;
        }

        /* ================= NAVBAR ================= */

        .navbar{
            padding:35px 22px 10px;
        }

        .navbar h1{
            font-size:22px;
            font-weight:700;
            margin-bottom:35px;

            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        /* ================= MENU ================= */

        .nav-links{
            display:flex;
            flex-direction:column;
            gap:10px;
        }

        .nav-links a{
            text-decoration:none;
            color:white;

            padding:20px 0;

            font-size:20px;
            font-weight:bold;

            display:flex;
            justify-content:space-between;
            align-items:center;

            border-bottom:1px solid rgba(255,255,255,0.15);

            transition:0.3s;
        }

        .nav-links a:hover{
            transform:translateX(5px);
        }

        .menu-left{
            display:flex;
            align-items:center;
            gap:14px;
        }

        .icon{
            width:30px;
            text-align:center;
        }

        .arrow{
            font-size:34px;
            color:white;
        }

        /* ================= CONTAINER ================= */

        .container{
            width:100%;
            max-width:1200px;
            margin:auto;
            padding:25px 20px;
        }

        /* ================= MAIN MENU ================= */

        .main-menu{
            background:rgba(255,255,255,0.92);
            border-radius:25px;
            padding:30px 25px;
            box-shadow:0 6px 20px rgba(0,0,0,0.25);
            backdrop-filter:blur(4px);
            color:#333;
            margin-top:25px;
        }

        .main-menu h2{
            margin-bottom:18px;
            font-size:28px;
            color:#2e7d32;
        }

        .main-menu p{
            margin-bottom:25px;
            font-size:16px;
            line-height:1.7;
        }

        /* ================= BUTTON ================= */

        .btn-main{
            display:block;
            width:100%;

            background:#4CAF50;
            color:white;

            padding:15px;

            border-radius:12px;

            text-decoration:none;
            font-weight:bold;

            transition:0.3s;
            font-size:16px;

            text-align:center;
        }

        .btn-main:hover{
            background:#388E3C;
        }

        /* ================= FOOTER ================= */

        .footer{
            text-align:center;
            padding:20px;
            background:rgba(0,0,0,0.5);
            margin-top:30px;
            font-size:14px;
            backdrop-filter:blur(5px);
        }

        /* ================= DESKTOP ================= */

        @media screen and (min-width:769px){

            .navbar{
                max-width:900px;
                margin:auto;
                padding-top:45px;
            }

            .navbar h1{
                font-size:48px;
                white-space:normal;
            }

            .nav-links{
                gap:15px;
            }

            .nav-links a{
                font-size:28px;
                padding:24px 0;
            }

            .container{
                max-width:900px;
            }

            .main-menu h2{
                font-size:36px;
            }

            .main-menu p{
                font-size:18px;
            }

        }

    </style>

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <div class="navbar">

        <h1>
            🌿 Deteksi Penyakit Tanaman Kentang
        </h1>

        <div class="nav-links">

            <a href="{{ url_for('home') }}">

                <div class="menu-left">
                    <span class="icon">🏠</span>
                    <span>Beranda</span>
                </div>

                <span class="arrow">›</span>

            </a>

            <a href="{{ url_for('history') }}">

                <div class="menu-left">
                    <span class="icon">📋</span>
                    <span>Riwayat</span>
                </div>

                <span class="arrow">›</span>

            </a>

            <a href="{{ url_for('profil') }}">

                <div class="menu-left">
                    <span class="icon">👤</span>
                    <span>Profil</span>
                </div>

                <span class="arrow">›</span>

            </a>

            <a href="{{ url_for('informasi') }}">

                <div class="menu-left">
                    <span class="icon">ℹ️</span>
                    <span>Informasi</span>
                </div>

                <span class="arrow">›</span>

            </a>

            <a href="{{ url_for('logout') }}">

                <div class="menu-left">
                    <span class="icon">🚪</span>
                    <span>Logout</span>
                </div>

                <span class="arrow">›</span>

            </a>

        </div>

    </div>

    <!-- ================= MENU UTAMA ================= -->

    <div class="container">

        <div class="main-menu">

            <h2>
                🔍 Deteksi Penyakit Daun Kentang
            </h2>

            <p>
                Unggah gambar daun kentang untuk mendeteksi penyakit
                menggunakan metode CNN MobileNetV2.
            </p>

            <a href="{{ url_for('detect') }}"
               class="btn-main">

               Mulai Deteksi

            </a>

        </div>

    </div>

    <!-- ================= FOOTER ================= -->

    <div class="footer">

        © 2026 Sistem Deteksi Penyakit Tanaman Kentang

    </div>

</body>
</html>
