<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Deteksi Penyakit Kentang</title>

    <style>

        /* ================= RESET ================= */

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        /* ================= BODY ================= */

        body{
            font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height:100vh;
            color:white;
            overflow-x:hidden;
            position:relative;
        }

        /* ================= BACKGROUND ================= */

        body::before{
            content:"";
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;

            background:
            url('/static/images/Bc.jpeg')
            no-repeat center center/cover;

            filter:
            blur(8px)
            brightness(0.45);

            transform:scale(1.08);

            z-index:-2;
        }

        body::after{
            content:"";
            position:fixed;
            inset:0;
            background:
            rgba(0,0,0,0.18);
            z-index:-1;
        }

        /* ================= CONTAINER ================= */

        .container{
            width:100%;
            max-width:500px;
            margin:auto;
            padding:70px 20px 40px;
        }

        /* ================= TITLE ================= */

        .title{
            display:flex;
            align-items:center;
            gap:16px;

            margin-bottom:45px;
        }

        .title-icon{
            font-size:40px;
        }

        .title h1{
            font-size:28px;
            line-height:1.4;
            font-weight:700;
        }

        /* ================= MENU ================= */

        .menu{
            width:100%;
        }

        .menu-item{
            width:100%;

            display:flex;
            justify-content:space-between;
            align-items:center;

            text-decoration:none;
            color:white;

            padding:28px 5px;

            border-bottom:
            1px solid rgba(255,255,255,0.18);

            transition:0.3s;
        }

        .menu-item:hover{
            background:
            rgba(255,255,255,0.04);
        }

        /* ================= LEFT ================= */

        .menu-left{
            display:flex;
            align-items:center;
            gap:20px;
        }

        .menu-icon{
            font-size:38px;
            width:42px;
            text-align:center;
        }

        .menu-text{
            font-size:24px;
            font-weight:600;
        }

        /* ================= RIGHT ARROW ================= */

        .arrow{
            font-size:46px;
            font-weight:300;
            opacity:0.9;
        }

        /* ================= MOBILE ================= */

        @media screen and (max-width:768px){

            .container{
                padding:
                65px 18px 30px;
            }

            .title{
                margin-bottom:40px;
            }

            .title h1{
                font-size:24px;
            }

            .title-icon{
                font-size:34px;
            }

            .menu-item{
                padding:24px 0;
            }

            .menu-icon{
                font-size:32px;
            }

            .menu-text{
                font-size:20px;
            }

            .arrow{
                font-size:38px;
            }

        }

    </style>

</head>

<body>

    <div class="container">

        <!-- ================= TITLE ================= -->

        <div class="title">

            <div class="title-icon">
                🌿
            </div>

            <h1>
                Deteksi Penyakit Tanaman Kentang
            </h1>

        </div>

        <!-- ================= MENU ================= -->

        <div class="menu">

            <!-- BERANDA -->

            <a href="{{ url_for('home') }}"
               class="menu-item">

                <div class="menu-left">

                    <div class="menu-icon">
                        🏠
                    </div>

                    <div class="menu-text">
                        Beranda
                    </div>

                </div>

                <div class="arrow">
                    ›
                </div>

            </a>

            <!-- RIWAYAT -->

            <a href="{{ url_for('history') }}"
               class="menu-item">

                <div class="menu-left">

                    <div class="menu-icon">
                        📋
                    </div>

                    <div class="menu-text">
                        Riwayat
                    </div>

                </div>

                <div class="arrow">
                    ›
                </div>

            </a>

            <!-- PROFIL -->

            <a href="{{ url_for('profil') }}"
               class="menu-item">

                <div class="menu-left">

                    <div class="menu-icon">
                        👤
                    </div>

                    <div class="menu-text">
                        Profil
                    </div>

                </div>

                <div class="arrow">
                    ›
                </div>

            </a>

            <!-- LOGOUT -->

            <a href="{{ url_for('logout') }}"
               class="menu-item">

                <div class="menu-left">

                    <div class="menu-icon">
                        🚪
                    </div>

                    <div class="menu-text">
                        Logout
                    </div>

                </div>

                <div class="arrow">
                    ›
                </div>

            </a>

            <!-- INFORMASI -->

            <a href="{{ url_for('detect') }}"
               class="menu-item">

                <div class="menu-left">

                    <div class="menu-icon">
                        ℹ️
                    </div>

                    <div class="menu-text">
                        Informasi
                    </div>

                </div>

                <div class="arrow">
                    ›
                </div>

            </a>

        </div>

    </div>

</body>
</html>
